version: '3.9'

# ============================================================
# Parkly — Docker Compose (Local Development)
# ============================================================
# Usage:
#   docker compose up -d            # Start all services
#   docker compose up postgres       # Start only DB
#   docker compose logs -f           # Follow all logs
# ============================================================

services:
  # ── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: parkly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parkly
      POSTGRES_PASSWORD: password
      POSTGRES_DB: parkly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkly"]
      interval: 5s
      timeout: 5s
      retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: parkly-dynamodb
    restart: unless-stopped
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  # DynamoDB table setup (runs once)
  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: parkly-dynamodb-setup
    depends_on:
      - dynamodb-local
    environment:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 2
        aws dynamodb create-table --table-name parkly-otp \
          --attribute-definitions AttributeName=phone,AttributeType=S \
          --key-schema AttributeName=phone,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --time-to-live-specification AttributeName=expiresAt,Enabled=true \
          --endpoint-url http://dynamodb-local:8000 2>/dev/null || true

        aws dynamodb create-table --table-name parkly-occupancy \
          --attribute-definitions AttributeName=spaceId,AttributeType=S AttributeName=timestamp,AttributeType=S \
          --key-schema AttributeName=spaceId,KeyType=HASH AttributeName=timestamp,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 2>/dev/null || true

        aws dynamodb create-table --table-name parkly-notifications \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 2>/dev/null || true

        echo "DynamoDB tables created"

  # ── Microservices ──────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: parkly-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      GATEWAY_PORT: 4000
      AUTH_URL: http://auth-service:4001
      BOOKING_URL: http://booking-service:4002
      PAYMENT_URL: http://payment-service:4003
      SEARCH_URL: http://search-service:4004
      OCCUPANCY_URL: http://occupancy-service:4007
      PRICING_URL: http://pricing-service:4008
      HOST_URL: http://host-service:4010
      ADMIN_URL: http://admin-service:4011
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - booking-service
    networks:
      - parkly-net

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: parkly-auth
    restart: unless-stopped
    env_file: .env
    environment:
      AUTH_PORT: 4001
      DATABASE_URL: postgresql://parkly:password@postgres:5432/parkly
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      dynamodb-local:
        condition: service_started
    networks:
      - parkly-net

  booking-service:
    build:
      context: .
      dockerfile: ./services/booking-service/Dockerfile
    container_name: parkly-booking
    restart: unless-stopped
    env_file: .env
    environment:
      BOOKING_PORT: 4002
      DATABASE_URL: postgresql://parkly:password@postgres:5432/parkly
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkly-net

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    container_name: parkly-payment
    restart: unless-stopped
    env_file: .env
    environment:
      PAYMENT_PORT: 4003
      DATABASE_URL: postgresql://parkly:password@postgres:5432/parkly
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkly-net

  search-service:
    build:
      context: .
      dockerfile: ./services/search-service/Dockerfile
    container_name: parkly-search
    restart: unless-stopped
    env_file: .env
    environment:
      SEARCH_PORT: 4004
      DATABASE_URL: postgresql://parkly:password@postgres:5432/parkly
      PREDICTION_URL: http://prediction-service:4005
    ports:
      - "4004:4004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkly-net

  prediction-service:
    build:
      context: .
      dockerfile: ./services/prediction-service/Dockerfile
    container_name: parkly-prediction
    restart: unless-stopped
    env_file: .env
    environment:
      PREDICTION_PORT: 4005
    ports:
      - "4005:4005"
    networks:
      - parkly-net

  occupancy-service:
    build:
      context: .
      dockerfile: ./services/occupancy-service/Dockerfile
    container_name: parkly-occupancy
    restart: unless-stopped
    env_file: .env
    environment:
      OCCUPANCY_PORT: 4007
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      NODE_ENV: development
    ports:
      - "4007:4007"
    depends_on:
      dynamodb-local:
        condition: service_started
    networks:
      - parkly-net

  pricing-service:
    build:
      context: .
      dockerfile: ./services/pricing-service/Dockerfile
    container_name: parkly-pricing
    restart: unless-stopped
    env_file: .env
    environment:
      PRICING_PORT: 4008
      DATABASE_URL: postgresql://parkly:password@postgres:5432/parkly
    ports:
      - "4008:4008"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkly-net

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: parkly-notification
    restart: unless-stopped
    env_file: .env
    environment:
      NOTIFICATION_PORT: 4009
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
    ports:
      - "4009:4009"
    depends_on:
      dynamodb-local:
        condition: service_started
    networks:
      - parkly-net

  host-service:
    build:
      context: .
      dockerfile: ./services/host-service/Dockerfile
    container_name: parkly-host
    restart: unless-stopped
    env_file: .env
    environment:
      HOST_PORT: 4010
      DATABASE_URL: postgresql://parkly:password@postgres:5432/parkly
    ports:
      - "4010:4010"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkly-net

  admin-service:
    build:
      context: .
      dockerfile: ./services/admin-service/Dockerfile
    container_name: parkly-admin-svc
    restart: unless-stopped
    env_file: .env
    environment:
      ADMIN_PORT: 4011
      DATABASE_URL: postgresql://parkly:password@postgres:5432/parkly
    ports:
      - "4011:4011"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkly-net

  # ── Web Apps ───────────────────────────────────────────────
  host-dashboard:
    build:
      context: ./apps/host-dashboard
      dockerfile: Dockerfile
    container_name: parkly-host-dashboard
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - parkly-net

  admin-portal:
    build:
      context: ./apps/admin-portal
      dockerfile: Dockerfile
    container_name: parkly-admin-portal
    restart: unless-stopped
    ports:
      - "3002:80"
    networks:
      - parkly-net

volumes:
  postgres_data:

networks:
  parkly-net:
    driver: bridge
